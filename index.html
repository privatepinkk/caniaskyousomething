<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想问你 💌</title>

<style>
body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  font-family: sans-serif;
  text-align: center;
  color: #ff6b81;
  overflow: hidden;
}

/* กล่องหลัก */
.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 1;
}

/* ปุ่ม */
.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

h1 {
  font-size: 22px;
  margin: 0;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 💖 หัวใจลอย */
.heart {
  position: absolute;
  bottom: -50px;
  color: #ff9aa2;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 0.7;
  }
  100% {
    transform: translateY(-110vh) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>我有一个问题…可以问你吗？🥺</h1>

  <div class="buttons">
    <button onclick="location.href='page2.html'">可以 💖</button>
    <button onclick="nope()">不可以 😈</button>
  </div>
</div>

<script>
function nope() {
  alert("一定要可以 😏");
  window.location.href = "page2.html";
}

/* สร้างหัวใจลอย */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题 💭</title>

<style>
body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  text-align: center;
  font-family: sans-serif;
  color: #ff6b81;
  overflow: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 1;
}

.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 20px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
}

/* รูป */
img {
  position: absolute;
  opacity: 0;
  transition: 0.5s;
}

/* 🔥 popup ดำ */
.popup {
  position: fixed;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: white;
  padding: 25px;
  border-radius: 20px;
  width: 80%;
  max-width: 300px;
  display: none;
  z-index: 20;
  text-align: left;
}

.popup button {
  background: none;
  color: #4da6ff;
  margin-top: 15px;
  padding: 0;
}
</style>
</head>

<body>

<div class="container">
  <h1>如果你在泰国想抽烟，要怎么说？🤔</h1>

  <div class="buttons">
    <button onclick="startChaos()">สูบบุหรี่ที่ได้ไหนครับ</button>
    <button onclick="startChaos()">สูบบุหรี่ที่เท่าไหร่ครับ</button>
  </div>
</div>

<!-- popup -->
<div id="popup" class="popup">
  <div>素不理帶東奶cup 😡</div>
  <button onclick="goNext()">ปิด</button>
</div>

<script>
function startChaos() {
  let count = 0;

  let interval = setInterval(() => {
    let img = document.createElement("img");
    img.src = "coffee.jpg";

    img.style.left = Math.random() * window.innerWidth + "px";
    img.style.top = Math.random() * window.innerHeight + "px";
    img.style.width = (60 + Math.random() * 120) + "px";

    document.body.appendChild(img);

    setTimeout(() => {
      img.style.opacity = 1;
    }, 50);

    count++;

    if (count >= 40) {
      clearInterval(interval);

      // 👉 แสดง popup หลังจากรูปขึ้น
      setTimeout(() => {
        document.getElementById("popup").style.display = "block";
      }, 300);
    }
  }, 80);
}

function goNext() {
  window.location.href = "page3.html";
}
</script>

</body>
</html>

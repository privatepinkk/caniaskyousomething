<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题 💭</title>

<style>
body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  text-align: center;
  font-family: sans-serif;
  color: #ff6b81;
  overflow: hidden;
}

/* กล่องหลัก */
.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 1;
}

/* ปุ่ม */
.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

h1 {
  font-size: 20px;
  margin: 0;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 20px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* รูปที่สุ่ม */
img {
  position: absolute;
  opacity: 0;
  transition: 0.5s;
  z-index: 0;
}

/* หัวใจลอย */
.heart {
  position: absolute;
  bottom: -50px;
  color: #ff9aa2;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
  z-index: 0;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 0.7;
  }
  100% {
    transform: translateY(-110vh) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>如果你在泰国想抽烟，要怎么说？🤔</h1>

  <div class="buttons">
    <button onclick="wrong()">素不理東帶奶cup</button>
    <button onclick="correct()">素不理帶東奶cup</button>
  </div>
</div>

<script>
function correct() {
  window.location.href = "page3.html";
}

function wrong() {
  let count = 0;

  let interval = setInterval(() => {
    let img = document.createElement("img");
    img.src = "coffee.jpg";

    img.style.left = Math.random() * window.innerWidth + "px";
    img.style.top = Math.random() * window.innerHeight + "px";
    img.style.width = (60 + Math.random() * 120) + "px";

    document.body.appendChild(img);

    setTimeout(() => {
      img.style.opacity = 1;
    }, 50);

    count++;

    if (count >= 50) {
      clearInterval(interval);

      setTimeout(() => {
        alert("你忘了吗 😭");
        window.location.href = "page3.html";
      }, 1000);
    }
  }, 80);
}

/* หัวใจลอย */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题 💭</title>

<style>
body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  text-align: center;
  font-family: sans-serif;
  color: #ff6b81;
  overflow: hidden;
}

/* กล่องหลัก */
.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 1;
}

/* ปุ่ม */
.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

h1 {
  font-size: 20px;
  margin: 0;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 20px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
}

/* รูป */
img {
  position: absolute;
  opacity: 0;
  transition: 0.5s;
  z-index: 0;
}

/* ข้อความเด้ง */
.popupText {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  font-weight: bold;
  animation: pop 1s ease;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* หัวใจลอย */
.heart {
  position: absolute;
  bottom: -50px;
  color: #ff9aa2;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0.7; }
  100% { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>如果你在泰国想抽烟，要怎么说？🤔</h1>

  <div class="buttons">
    <button onclick="showChaos()">1. สูบบุหรี่ที่ได้ไหนครับ</button>
    <button onclick="showChaos()">2. สูบบุหรี่ที่เท่าไหร่ครับ</button>
  </div>
</div>

<script>
function showChaos() {
  let count = 0;

  let interval = setInterval(() => {
    let img = document.createElement("img");
    img.src = "coffee.jpg";

    img.style.left = Math.random() * window.innerWidth + "px";
    img.style.top = Math.random() * window.innerHeight + "px";
    img.style.width = (60 + Math.random() * 120) + "px";

    document.body.appendChild(img);

    setTimeout(() => {
      img.style.opacity = 1;
    }, 50);

    count++;

    if (count >= 40) {
      clearInterval(interval);

      // แสดงข้อความ
      let text = document.createElement("div");
      text.className = "popupText";
      text.innerText = "素不理帶東奶cup 😡";

      text.style.left = "50%";
      text.style.top = "50%";
      text.style.transform = "translate(-50%, -50%)";

      document.body.appendChild(text);

      setTimeout(() => {
        window.location.href = "page3.html";
      }, 1500);
    }
  }, 80);
}

/* หัวใจลอย */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>

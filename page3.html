<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最后 💘</title>

<style>
body {
  margin: 0;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  text-align: center;
  font-family: sans-serif;
  overflow: hidden;
  color: #ff6b81;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 1;
}

.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

h1 {
  margin: 0;
  font-size: 22px;
}

button {
  border: none;
  border-radius: 20px;
  padding: 12px 20px;
  cursor: pointer;
  font-size: 18px;
}

/* 💖 ปุ่มชอบ */
#likeBtn {
  background: #ff6b81;
  color: white;
  transition: 0.2s;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* 😈 ปุ่มไม่ชอบ */
#dislikeBtn {
  background: #ccc;
  position: relative;
  z-index: 2;
}

/* ข้อความแซว */
.tease {
  position: absolute;
  color: #ff4d6d;
  font-weight: bold;
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 💖 หัวใจลอย */
.heart {
  position: absolute;
  bottom: -50px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>最后一个问题：你喜欢我吗？💘</h1>

  <div class="buttons">
    <button id="likeBtn" onclick="love()">喜欢 💖</button>
    <button id="dislikeBtn">不喜欢 😝</button>
  </div>
</div>

<script>
let size = 18;
let moved = false;
let speed = 1;

/* 💖 ปุ่มชอบโต */
setInterval(() => {
  size += 2;
  let btn = document.getElementById("likeBtn");
  btn.style.fontSize = size + "px";
  btn.style.padding = (size/2) + "px";
}, 800);

/* 😈 หนีแบบฉลาด */
function runAway(e) {
  let btn = document.getElementById("dislikeBtn");

  if (!moved) {
    btn.style.position = "absolute";
    moved = true;
  }

  let x = Math.random() * (window.innerWidth - 120);
  let y = Math.random() * (window.innerHeight - 80);

  btn.style.left = x + "px";
  btn.style.top = y + "px";

  speed += 0.3;

  tease(x, y);
}

/* 🧠 ตรวจจับเข้าใกล้ */
document.addEventListener("mousemove", (e) => {
  let btn = document.getElementById("dislikeBtn");
  let rect = btn.getBoundingClientRect();

  let dx = e.clientX - (rect.left + rect.width/2);
  let dy = e.clientY - (rect.top + rect.height/2);
  let dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 120 / speed) {
    runAway();
  }
});

/* 📱 มือถือ */
document.getElementById("dislikeBtn").addEventListener("touchstart", runAway);
document.getElementById("dislikeBtn").addEventListener("mouseover", runAway);

/* 😏 ข้อความแซว */
function tease(x, y) {
  const msgs = ["抓不到我 😝", "不行哦 😏", "再试试？", "哈哈哈 😂"];

  let t = document.createElement("div");
  t.className = "tease";
  t.innerText = msgs[Math.floor(Math.random()*msgs.length)];

  t.style.left = x + "px";
  t.style.top = y + "px";

  document.body.appendChild(t);

  setTimeout(() => t.remove(), 800);
}

/* 💥 กดชอบ */
function love() {
  explodeHearts();

  setTimeout(() => {
    document.body.innerHTML = `
      <div style="
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        height:100dvh;
        text-align:center;
        color:#ff6b81;
      ">
        <img src="cat.jpg" style="width:250px; border-radius:20px;"><br>
        <h1>我就知道，嘻嘻嘻 😏💖</h1>
      </div>
    `;
  }, 800);
}

/* 💖 ระเบิดหัวใจ */
function explodeHearts() {
  for (let i = 0; i < 30; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💖";

    h.style.left = "50%";
    h.style.top = "50%";

    h.style.transform = `translate(-50%, -50%) 
      translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px)`;

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 1000);
  }
}

/* 💖 หัวใจลอยปกติ */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
